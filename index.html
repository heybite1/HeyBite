<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>HeyBite — Coming Soon</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    :root {
      --green: #4ade80;
      --green-dim: #22c55e;
      --green-dark: #16a34a;
      --green-glow: rgba(74, 222, 128, 0.12);
      --green-glow-strong: rgba(74, 222, 128, 0.22);
      --bg: #060c08;
      --bg-card: rgba(74, 222, 128, 0.04);
      --text: #f0fdf4;
      --text-muted: rgba(240, 253, 244, 0.45);
      --border: rgba(74, 222, 128, 0.15);
    }

    html {
      scroll-behavior: smooth;
    }

    body {
      background-color: var(--bg);
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      overflow-x: hidden;
      position: relative;
    }

    /* ── Ambient background ── */
    .bg-glow {
      position: fixed;
      inset: 0;
      z-index: 0;
      pointer-events: none;
      overflow: hidden;
    }

    .bg-glow::before {
      content: '';
      position: absolute;
      top: -20%;
      left: 50%;
      transform: translateX(-50%);
      width: 70vw;
      height: 70vw;
      max-width: 700px;
      max-height: 700px;
      background: radial-gradient(circle, rgba(74,222,128,0.14) 0%, rgba(22,163,74,0.06) 45%, transparent 70%);
      border-radius: 50%;
      animation: pulseGlow 7s ease-in-out infinite alternate;
    }

    .bg-glow::after {
      content: '';
      position: absolute;
      bottom: -15%;
      left: 50%;
      transform: translateX(-50%);
      width: 50vw;
      height: 50vw;
      max-width: 500px;
      max-height: 500px;
      background: radial-gradient(circle, rgba(74,222,128,0.06) 0%, transparent 65%);
      border-radius: 50%;
      animation: pulseGlow 9s ease-in-out 2s infinite alternate-reverse;
    }

    @keyframes pulseGlow {
      from { opacity: 0.6; transform: translateX(-50%) scale(0.97); }
      to   { opacity: 1;   transform: translateX(-50%) scale(1.04); }
    }

    /* ── Grain overlay ── */
    .grain {
      position: fixed;
      inset: 0;
      z-index: 1;
      pointer-events: none;
      opacity: 0.028;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)'/%3E%3C/svg%3E");
      background-repeat: repeat;
      background-size: 128px 128px;
    }

    /* ── Main wrapper ── */
    .wrapper {
      position: relative;
      z-index: 2;
      width: 100%;
      max-width: 520px;
      padding: 48px 24px 32px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0;
    }

    /* ── Logo block ── */
    .logo-wrap {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 20px;
      margin-bottom: 40px;
      opacity: 0;
      transform: translateY(28px);
      animation: fadeUp 0.8s cubic-bezier(0.22, 1, 0.36, 1) 0.1s forwards;
    }

    .logo-icon {
      width: 72px;
      height: 72px;
      background: linear-gradient(145deg, #16a34a, #4ade80);
      border-radius: 20px;
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow:
        0 0 0 1px rgba(74,222,128,0.25),
        0 0 30px rgba(74,222,128,0.25),
        0 8px 32px rgba(0,0,0,0.5);
      position: relative;
      animation: iconFloat 5s ease-in-out infinite;
    }

    @keyframes iconFloat {
      0%, 100% { transform: translateY(0px); }
      50%       { transform: translateY(-6px); }
    }

    .logo-icon svg {
      width: 38px;
      height: 38px;
    }

    .brand-name {
      font-family: 'Syne', sans-serif;
      font-weight: 800;
      font-size: clamp(32px, 8vw, 44px);
      letter-spacing: -1.5px;
      line-height: 1;
      color: var(--text);
      text-align: center;
    }

    .brand-name span {
      color: var(--green);
    }

    /* ── Badge ── */
    .badge {
      display: inline-flex;
      align-items: center;
      gap: 7px;
      padding: 6px 14px;
      border-radius: 100px;
      background: var(--green-glow);
      border: 1px solid var(--border);
      font-size: 11px;
      font-weight: 500;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--green);
      margin-bottom: 32px;
      opacity: 0;
      transform: translateY(18px);
      animation: fadeUp 0.7s cubic-bezier(0.22, 1, 0.36, 1) 0.3s forwards;
    }

    .badge-dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: var(--green);
      animation: blink 1.8s ease-in-out infinite;
    }

    @keyframes blink {
      0%, 100% { opacity: 1; }
      50%       { opacity: 0.25; }
    }

    /* ── Headline ── */
    .headline {
      font-family: 'Syne', sans-serif;
      font-weight: 800;
      font-size: clamp(52px, 15vw, 88px);
      line-height: 0.92;
      letter-spacing: -3px;
      text-align: center;
      margin-bottom: 28px;
      opacity: 0;
      transform: translateY(24px);
      animation: fadeUp 0.8s cubic-bezier(0.22, 1, 0.36, 1) 0.45s forwards;
    }

    .headline .line {
      display: block;
    }

    .headline .line-food {
      color: var(--text);
    }

    .headline .line-fast {
      color: var(--text);
    }

    .headline .line-delivered {
      color: var(--green);
      font-size: clamp(44px, 12.5vw, 80px);
      letter-spacing: -2px;
    }

    /* ── Subtext ── */
    .subtext {
      font-size: 15px;
      font-weight: 400;
      color: var(--text-muted);
      text-align: center;
      line-height: 1.65;
      max-width: 320px;
      margin-bottom: 40px;
      opacity: 0;
      transform: translateY(18px);
      animation: fadeUp 0.7s cubic-bezier(0.22, 1, 0.36, 1) 0.6s forwards;
    }

    /* ── Email form ── */
    .form-wrap {
      width: 100%;
      display: flex;
      flex-direction: column;
      gap: 12px;
      margin-bottom: 48px;
      opacity: 0;
      transform: translateY(18px);
      animation: fadeUp 0.7s cubic-bezier(0.22, 1, 0.36, 1) 0.75s forwards;
    }

    .input-row {
      display: flex;
      gap: 10px;
      width: 100%;
    }

    .email-input {
      flex: 1;
      background: rgba(255,255,255,0.04);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 15px 18px;
      font-family: 'DM Sans', sans-serif;
      font-size: 14px;
      font-weight: 400;
      color: var(--text);
      outline: none;
      transition: border-color 0.25s, box-shadow 0.25s, background 0.25s;
      caret-color: var(--green);
    }

    .email-input::placeholder {
      color: rgba(240,253,244,0.28);
    }

    .email-input:focus {
      border-color: rgba(74,222,128,0.45);
      background: rgba(74,222,128,0.04);
      box-shadow: 0 0 0 3px rgba(74,222,128,0.08);
    }

    .notify-btn {
      flex-shrink: 0;
      background: linear-gradient(135deg, #22c55e, #4ade80);
      border: none;
      border-radius: 14px;
      padding: 15px 22px;
      font-family: 'Syne', sans-serif;
      font-size: 14px;
      font-weight: 700;
      letter-spacing: 0.02em;
      color: #052e16;
      cursor: pointer;
      transition: transform 0.18s, box-shadow 0.18s, filter 0.18s;
      box-shadow: 0 4px 20px rgba(74,222,128,0.3);
      white-space: nowrap;
    }

    .notify-btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 30px rgba(74,222,128,0.4);
      filter: brightness(1.07);
    }

    .notify-btn:active {
      transform: translateY(0px);
      box-shadow: 0 2px 12px rgba(74,222,128,0.25);
    }

    .notify-btn.loading {
      pointer-events: none;
      opacity: 0.7;
    }

    /* success message */
    .success-msg {
      display: none;
      align-items: center;
      justify-content: center;
      gap: 8px;
      font-size: 13.5px;
      font-weight: 500;
      color: var(--green);
      background: rgba(74,222,128,0.07);
      border: 1px solid rgba(74,222,128,0.2);
      border-radius: 10px;
      padding: 12px 18px;
      text-align: center;
      animation: fadeUp 0.4s ease forwards;
    }

    .success-msg.show {
      display: flex;
    }

    /* ── Divider + Stats ── */
    .stats-row {
      display: flex;
      align-items: center;
      gap: 0;
      width: 100%;
      margin-bottom: 48px;
      opacity: 0;
      transform: translateY(16px);
      animation: fadeUp 0.7s cubic-bezier(0.22, 1, 0.36, 1) 0.9s forwards;
    }

    .stat {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 4px;
      padding: 20px 12px;
      background: var(--bg-card);
      border: 1px solid var(--border);
      transition: background 0.25s;
    }

    .stat:first-child { border-radius: 16px 0 0 16px; }
    .stat:last-child  { border-radius: 0 16px 16px 0; }
    .stat:not(:last-child) { border-right: none; }

    .stat:hover {
      background: rgba(74,222,128,0.07);
    }

    .stat-val {
      font-family: 'Syne', sans-serif;
      font-weight: 800;
      font-size: 22px;
      color: var(--green);
      letter-spacing: -0.5px;
    }

    .stat-label {
      font-size: 11px;
      font-weight: 400;
      color: var(--text-muted);
      letter-spacing: 0.04em;
      text-transform: uppercase;
    }

    /* ── Footer ── */
    .footer {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 6px;
      opacity: 0;
      animation: fadeUp 0.6s cubic-bezier(0.22, 1, 0.36, 1) 1.05s forwards;
    }

    .footer-location {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 12px;
      color: var(--text-muted);
      font-weight: 400;
      letter-spacing: 0.03em;
    }

    .footer-location svg {
      opacity: 0.55;
      flex-shrink: 0;
    }

    .footer-copy {
      font-size: 11px;
      color: rgba(240,253,244,0.2);
      letter-spacing: 0.04em;
    }

    /* ── Keyframes ── */
    @keyframes fadeUp {
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    /* ── Responsive tweaks ── */
    @media (max-width: 360px) {
      .headline {
        font-size: 46px;
        letter-spacing: -2.5px;
      }

      .headline .line-delivered {
        font-size: 40px;
        letter-spacing: -1.5px;
      }

      .input-row {
        flex-direction: column;
      }

      .notify-btn {
        width: 100%;
        padding: 15px;
        text-align: center;
      }
    }

    @media (min-width: 480px) {
      .wrapper {
        padding: 64px 32px 40px;
      }
    }
  </style>
</head>
<body>

  <!-- Ambient glow -->
  <div class="bg-glow" aria-hidden="true"></div>
  <!-- Grain texture -->
  <div class="grain" aria-hidden="true"></div>

  <main class="wrapper">

    <!-- Logo -->
    <div class="logo-wrap">
      <div class="logo-icon" aria-hidden="true">
        <svg viewBox="0 0 48 48" fill="none" xmlns="http://www.w3.org/2000/svg">
          <defs>
            <clipPath id="bite2">
              <path d="M0 0 H48 V48 H0 Z M33 11 m-7,0 a7,7 0 1,0 14,0 a7,7 0 1,0 -14,0 M39 20 m-7,0 a7,7 0 1,0 14,0 a7,7 0 1,0 -14,0"/>
            </clipPath>
          </defs>
          <circle cx="24" cy="26" r="17" fill="white" clip-path="url(#bite2)"/>
          <circle cx="18" cy="24" r="3" fill="#1a7a3c"/>
          <circle cx="26" cy="31" r="3" fill="#1a7a3c"/>
          <circle cx="28" cy="20" r="2.2" fill="#1a7a3c"/>
        </svg>
      </div>

      <div class="brand-name">Hey<span>Bite</span></div>
    </div>

    <!-- Coming soon badge -->
    <div class="badge">
      <span class="badge-dot"></span>
      Coming Soon
    </div>

    <!-- Headline -->
    <h1 class="headline" aria-label="Food. Fast. Delivered.">
      <span class="line line-food">Food.</span>
      <span class="line line-fast">Fast.</span>
      <span class="line line-delivered">Delivered.</span>
    </h1>

    <!-- Subtext -->
    <p class="subtext">
      Campus-fast food delivery is coming to Ekpoma. Be the first to know when we launch.
    </p>

    <!-- Email form -->
    <div class="form-wrap">
      <div class="input-row">
        <input
          class="email-input"
          type="email"
          id="emailInput"
          placeholder="Enter your email address"
          autocomplete="email"
          aria-label="Email address"
        />
        <button class="notify-btn" id="notifyBtn" onclick="handleNotify()">
          Notify Me
        </button>
      </div>
      <div class="success-msg" id="successMsg">
        <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
          <circle cx="8" cy="8" r="7" stroke="#4ade80" stroke-width="1.5"/>
          <path d="M5 8.5l2 2 4-4" stroke="#4ade80" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
        You're on the list! We'll hit you up when we launch 🍪
      </div>
    </div>

    <!-- Stats -->
    <div class="stats-row" role="list" aria-label="Why HeyBite">
      <div class="stat" role="listitem">
        <span class="stat-val">30min</span>
        <span class="stat-label">Delivery</span>
      </div>
      <div class="stat" role="listitem">
        <span class="stat-val">24/7</span>
        <span class="stat-label">At Your Service</span>
      </div>
      <div class="stat" role="listitem">
        <span class="stat-val">₦0</span>
        <span class="stat-label">Join Fee</span>
      </div>
    </div>

    <!-- Footer -->
    <footer class="footer">
      <div class="footer-location">
        <svg width="12" height="12" viewBox="0 0 12 12" fill="none">
          <path d="M6 1C4.07 1 2.5 2.57 2.5 4.5c0 2.7 3.5 6.5 3.5 6.5s3.5-3.8 3.5-6.5C9.5 2.57 7.93 1 6 1Zm0 4.75a1.25 1.25 0 1 1 0-2.5 1.25 1.25 0 0 1 0 2.5Z" fill="currentColor"/>
        </svg>
        Ekpoma, Edo State, Nigeria
      </div>
      <div class="footer-copy">© 2025 HeyBite. All rights reserved.</div>
    </footer>

  </main>

  <script>
    function handleNotify() {
      const input = document.getElementById('emailInput');
      const btn   = document.getElementById('notifyBtn');
      const msg   = document.getElementById('successMsg');
      const email = input.value.trim();

      // Basic email validation
      const re = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
      if (!re.test(email)) {
        input.style.borderColor = 'rgba(248,113,113,0.6)';
        input.style.boxShadow   = '0 0 0 3px rgba(248,113,113,0.1)';
        input.focus();
        setTimeout(() => {
          input.style.borderColor = '';
          input.style.boxShadow   = '';
        }, 2000);
        return;
      }

      // Simulate submission
      btn.classList.add('loading');
      btn.textContent = '...';

      setTimeout(() => {
        input.style.display  = 'none';
        btn.style.display    = 'none';
        msg.classList.add('show');

        // Store locally
        try {
          const saved = JSON.parse(localStorage.getItem('hb_emails') || '[]');
          if (!saved.includes(email)) {
            saved.push(email);
            localStorage.setItem('hb_emails', JSON.stringify(saved));
          }
        } catch(e) {}
      }, 900);
    }

    // Allow Enter key
    document.getElementById('emailInput').addEventListener('keydown', function(e) {
      if (e.key === 'Enter') handleNotify();
    });
  </script>

</body>
</html>
